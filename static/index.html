<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Pulse — Fitness & Nutrition AI</title>
  <meta name="description" content="Pulse, your AI coach for fitness, diet and nutrition." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0891b2" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pulse" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="26" height="26">
            <path d="M2 16 H8 L11 8 L16 24 L20 13 L23 16 H30"
                  fill="none" stroke="white" stroke-width="2.4"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>Pulse</h1>
          <span class="tagline">Fitness &amp; Nutrition AI</span>
        </div>
      </div>
      <button id="newChat" class="icon-btn" title="New chat" aria-label="New chat">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>
    </header>

    <!-- Chat -->
    <main id="chat" class="chat">
      <div id="welcome" class="welcome">
        <div class="welcome-orb">
          <svg viewBox="0 0 32 32" width="40" height="40">
            <path d="M2 16 H8 L11 8 L16 24 L20 13 L23 16 H30"
                  fill="none" stroke="white" stroke-width="2.4"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2>Hey, I'm Pulse 👋</h2>
        <p>Your AI coach for workouts, meals, macros and nutrition. Ask me anything, or try one of these:</p>
        <div class="chips" id="chips">
          <button class="chip">How much protein is in 100g chicken breast?</button>
          <button class="chip">Build me a high-protein vegetarian lunch under 600 kcal</button>
          <button class="chip">A beginner full-body workout, 3x a week</button>
          <button class="chip">Is a banana a good pre-workout snack?</button>
        </div>
      </div>
    </main>

    <!-- Input -->
    <form id="composer" class="composer" autocomplete="off">
      <input id="input" type="text" placeholder="Ask Pulse anything…" aria-label="Message" />
      <button id="send" type="submit" class="send-btn" aria-label="Send">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2 11 13"/><path d="M22 2 15 22 11 13 2 9 22 2z"/>
        </svg>
      </button>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
